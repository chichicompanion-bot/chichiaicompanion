<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="50" cy="44" r="35" stroke="url(#g)" stroke-width="7" fill="none"/>

  <!-- Speech bubble tail (bottom-left) -->
  <path d="M22 66 L8 92 L38 77" fill="url(#g)"/>

  <!-- Top person: head + shoulders -->
  <circle cx="50" cy="11" r="5.5" fill="url(#g)"/>
  <path d="M42 22 Q50 17 58 22" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>

  <!-- Top-left small dot -->
  <circle cx="19" cy="23" r="3.5" fill="url(#g)"/>

  <!-- Left person: head + shoulders -->
  <circle cx="13" cy="47" r="7" fill="url(#g)"/>
  <path d="M3 62 Q13 55 23 62" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>

  <!-- Right person: head + shoulders -->
  <circle cx="87" cy="47" r="7" fill="url(#g)"/>
  <path d="M77 62 Q87 55 97 62" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>

  <!-- Center main person (large): head + shoulders -->
  <circle cx="50" cy="57" r="11" fill="url(#g)"/>
  <path d="M27 76 Q50 65 73 76" stroke="url(#g)" stroke-width="6" stroke-linecap="round"/>
</svg>
